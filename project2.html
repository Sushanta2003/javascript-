<!-- write js to enter n number and display the sum of those numbers. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        let number=[];
let n = parseInt(prompt("enter how may numbers you want to enter"));
let sum = 0;

for(let i=0; i<n; i++)
{
    let num = parseInt(prompt("Enter number" + (i + 1)+":"));
    number.push(num);
    
}
for(i=0;i<number.length;i++){
    sum=sum+number[i];
}
document.write("Sum of given numbers is: "+sum);
    </script>

</body>
</html>
