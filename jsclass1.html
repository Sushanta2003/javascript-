<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    First:
    <input type="text" name="" id="first"><br>
    Second:
    <input type="text" name="" id="second"><br>
    <button onclick="calculate()">calculate</button>
    <p id="demo"> </p>
    <script>
        function calculate(){
         let a = parseInt(document.getElementById("first").value);
         let b = parseInt(document.getElementById("second").value);
         let sum = a+b;
        document.getElementById("demo").innerHTML="sum is:" + sum;
}
    </script>
</body>
</html>
