<!-- create an array of fruits. add on fruits using push and remove one using pop and display the updated array -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <script>
      document.write("The name of the fruits are given below "+"<br>")
        let fruit = ["orange","apple","pineapple"]
        fruit.push("banana")
        document.write(fruit);
        let remove=fruit.pop()
        document.write("<br>"+"<br>"+"lets remove :" + remove);
        document.write("<br>"+"After removing  :" +" " + fruit)
    </script>
 </body>
 </html>
