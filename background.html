<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="height: 600px; width: 600px;" id="box" onmouseover="zoomIn()" onmouseout="zoomOut()">
    </div>
     
<script>
    function zoomIn()
    {
        let photo = document.getElementById("box");
        photo.style.background = "red";     
    }
    function zoomOut()
    {
        let photo = document.getElementById("box");
        photo.style.background = "green";     
    }
</script>
</body>
</html>
